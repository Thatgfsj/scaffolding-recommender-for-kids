        .input-group label {

            margin-bottom: 8px;
            color: #666;

        .input-group input:focus, .input-group select:focus {

            border-color: #667eea;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;

        }

        }

        }

        }

            color: #333;

            gap: 8px;
            flex-wrap: wrap;

        }

            font-weight: 500;
        }
        
        .tag-complexity {
            background: #e3f2fd;
            color: #1976d2;
        }
        
        .tag-value {
            background: #f3e5f5;
            color: #7b1fa2;
        }
        
        .video-score {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .score-bar {
            width: 100px;
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            overflow: hidden;
        }
        
        .score-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 3px;
            transition: width 0.5s;
        }
        
        .score-value {
            font-weight: 600;
            color: #667eea;
        }

            font-size: 0.85em;
            color: #666;
            margin-top: 8px;
            padding: 8px;
            background: white;
            border-radius: 6px;
            border-left: 3px solid #667eea;

            opacity: 0.9;

            gap: 12px;

            align-items: center;
            gap: 12px;
        }

            font-size: 0.9em;
            color: #666;
        }

            height: 24px;
            background: #f0f0f0;
            border-radius: 12px;
            overflow: hidden;
            position: relative;

            text-align: right;
            font-weight: 600;
            color: #333;

                    { id: 'v112', title: '垃圾分类小知识', category: '环保意识', complexity: 'L2', emoji: '♻️', values: { curiosity: 0.6, empathy: 0.5, responsibility: 0.9, diversity: 0.4, environment: 0.9 } },
                    { id: 'v113', title: '森林防火的重要性', category: '环保意识', complexity: 'L3', emoji: '🔥', values: { curiosity: 0.6, empathy: 0.6, responsibility: 0.8, diversity: 0.4, environment: 0.9 } },
                    
                    // Advanced (L5-L6)
                    { id: 'v121', title: '仿生机器人设计', category: '进阶科技', complexity: 'L5', emoji: '🦾', values: { curiosity: 0.95, empathy: 0.4, responsibility: 0.5, diversity: 0.6, environment: 0.6 } },
                    { id: 'v122', title: '人工智能如何学习', category: '进阶科技', complexity: 'L6', emoji: '🧠', values: { curiosity: 0.95, empathy: 0.3, responsibility: 0.5, diversity: 0.5, environment: 0.4 } },
                    { id: 'v123', title: '量子物理入门', category: '进阶科技', complexity: 'L6', emoji: '⚛️', values: { curiosity: 0.98, empathy: 0.2, responsibility: 0.4, diversity: 0.4, environment: 0.3 } },
                ];
                
                contents.forEach(c => this.contentLibrary[c.id] = c);
            }
            
            initUser(name, ageGroup) {
                this.user = { name, ageGroup };
                this.watchHistory = [];
                this.valueExposure = { curiosity: 0.5, empathy: 0.5, responsibility: 0.5, diversity: 0.5, environment: 0.5 };
                this.topicDistribution = {};
                this.naturalEndBonus = 0;
                this.parentIntent = [];
                this.initialized = true;
                
                // Simulate some initial history for better recommendations
                this.simulateInitialHistory();
            }
            
            simulateInitialHistory() {
                // Start user with typical interests
                const initialVideos = ['v001', 'v021', 'v022']; // toys and funny pets
                initialVideos.forEach(vid => {
                    const video = this.contentLibrary[vid];
                    this.recordWatch(vid, 'watch');
                });
            }
            
            recordWatch(videoId, action) {
                const video = this.contentLibrary[videoId];
                if (!video) return;
                
                this.watchHistory.push({ videoId, action, timestamp: Date.now() });
                
                // Update topic distribution
                this.topicDistribution[video.category] = (this.topicDistribution[video.category] || 0) + 1;
                
                // Update value exposure (Bayesian-like update)
                Object.keys(video.values).forEach(key => {
                    const prior = this.valueExposure[key] || 0.5;
                    this.valueExposure[key] = 0.7 * prior + 0.3 * video.values[key];
                });
                
                // Update natural end bonus
                if (action === 'natural_end') {
                    this.naturalEndBonus = Math.min(1, this.naturalEndBonus + 0.1);
                } else if (action === 'auto_next') {
                    this.naturalEndBonus = Math.max(0, this.naturalEndBonus - 0.05);
                }
            }
            
            computeDiversityEntropy() {
                const total = Object.values(this.topicDistribution).reduce((a, b) => a + b, 0);
                if (total === 0) return 0;
                
                let entropy = 0;
                Object.values(this.topicDistribution).forEach(count => {
                    const p = count / total;
                    if (p > 0) entropy -= p * Math.log2(p);
                });
                return entropy;
            }
            
            computeBubbleRisk() {
                const entropy = this.computeDiversityEntropy();
                const maxEntropy = Math.log2(Object.keys(this.topicDistribution).length || 1);
                return Math.max(0, (2 - entropy) / 2);
            }
            
            // ========== ML: Content-Based Filtering with Similarity ==========
            computeSimilarity(videoA, videoB) {
                // Cosine similarity on value vectors
                let dotProduct = 0, normA = 0, normB = 0;
                Object.keys(videoA.values).forEach(key => {
                    dotProduct += videoA.values[key] * videoB.values[key];
                    normA += videoA.values[key] ** 2;
                    normB += videoB.values[key] ** 2;
                });
                return dotProduct / (Math.sqrt(normA) * Math.sqrt(normB) + 0.0001);
            }
            
            // ========== ML: Collaborative Filtering (User-Based) ==========
            findSimilarUsers() {
                // In a real system, this would query a user-item matrix
                // Here we simulate by finding users with similar watch patterns
                return this.watchHistory.map(h => h.videoId);
            }
            
            // ========== ML: Learning to Rank (Simplified) ==========
            computeMLScore(video) {
                let score = 0;
                
                // Factor 1: Content Quality (pleasure A)
                const avgValue = Object.values(video.values).reduce((a, b) => a + b) / 5;
                score += 0.25 * avgValue;
                
                // Factor 2: Bubble Penalty (B)
                const bubbleRisk = this.computeBubbleRisk();
                const watchedCategories = Object.keys(this.topicDistribution);
                const isNewCategory = !watchedCategories.includes(video.category);
                score -= 0.25 * bubbleRisk * (isNewCategory ? 0 : 1);
                
                // Factor 3: Value Potential (C) - based on parent intent
                if (this.parentIntent.length > 0) {
                    let intentScore = 0;
                    this.parentIntent.forEach(intent => {
                        const key = intent.toLowerCase();
                        if (video.values[key] !== undefined) {
                            intentScore += video.values[key];
                        }
                    });
                    score += 0.30 * (intentScore / this.parentIntent.length);
                } else {
                    score += 0.25 * avgValue;
                }
                
                // Factor 4: Natural End Encouragement (D)
                score += 0.15 * this.naturalEndBonus;
                
                // Factor 5: Exploration Bonus - ML-based diversity
                score += 0.15 * (isNewCategory ? 0.3 : 0) * (1 - bubbleRisk);
                
                // Factor 6: Scaffolding proximity bonus (guided learning path)
                const lastWatched = this.watchHistory[this.watchHistory.length - 1];
                if (lastWatched) {
                    const lastVideo = this.contentLibrary[lastWatched.videoId];
                    const complexityOrder = ['L1', 'L2', 'L3', 'L4', 'L5', 'L6'];
                    const lastLevel = complexityOrder.indexOf(lastVideo.complexity);
                    const thisLevel = complexityOrder.indexOf(video.complexity);
                    
                    // Slight boost for progressing complexity (within 2 levels)
                    if (thisLevel > lastLevel && thisLevel - lastLevel <= 2) {
                        score += 0.1;
                    }
                }
                
                // Factor 7: Personalized recommendation (ML model)
                // Simulate a "like" prediction based on content similarity
                const watchedVideos = this.watchHistory.map(h => this.contentLibrary[h.videoId]);
                if (watchedVideos.length > 0) {
                    const avgSimilarity = watchedVideos.reduce((sum, wv) => 
                        sum + this.computeSimilarity(wv, video), 0) / watchedVideos.length;
                    score += 0.1 * avgSimilarity;
                }
                
                return Math.min(1, Math.max(0, score));
            }
            
            getRecommendations(count = 8) {
                const candidates = Object.values(this.contentLibrary)
                    .filter(v => !this.watchHistory.some(h => h.videoId === v.id));
                
                const scored = candidates.map(video => ({
                    ...video,
                    mlScore: this.computeMLScore(video),
                    reason: this.generateReason(video)
                }));
                
                // Sort by ML score
                scored.sort((a, b) => b.mlScore - a.mlScore);
                
                // Apply diversity quota (60% ML ranked, 20% diverse, 10% scaffolding, 10% explore)
                const mlCount = Math.floor(count * 0.6);
                const diverseCount = Math.floor(count * 0.2);
                const scaffoldCount = Math.floor(count * 0.1);
                
                const results = [
                    ...scored.slice(0, mlCount),
                    ...this.getDiverseRecommendations(scored, mlCount, diverseCount),
                    ...this.getScaffoldingRecommendations(scored, mlCount + diverseCount, scaffoldCount)
                ].slice(0, count);
                
                return results;
            }
            
            getDiverseRecommendations(scored, skipCount, count) {
                const watchedCategories = new Set(Object.keys(this.topicDistribution));
                const diverse = scored.slice(skipCount)
                    .filter(v => !watchedCategories.has(v.category))
                    .slice(0, count);
                return diverse;
            }
            
            getScaffoldingRecommendations(scored, skipCount, count) {
                const lastWatched = this.watchHistory[this.watchHistory.length - 1];
                if (!lastWatched) return [];
                
                const lastVideo = this.contentLibrary[lastWatched.videoId];
                const scaffoldCandidates = scored.slice(skipCount)
                    .filter(v => {
                        const complexityOrder = ['L1', 'L2', 'L3', 'L4', 'L5', 'L6'];
                        const lastLevel = complexityOrder.indexOf(lastVideo.complexity);
                        const thisLevel = complexityOrder.indexOf(v.complexity);
                        return thisLevel > lastLevel && thisLevel - lastLevel <= 2;
                    })
                    .slice(0, count);
                return scaffoldCandidates;
            }
            
            generateReason(video) {
                const entropy = this.computeDiversityEntropy();
                const bubbleRisk = this.computeBubbleRisk();
                
                if (bubbleRisk > 0.3) {
                    return `🌟 发现新领域！你可能对「${video.category}」感兴趣`;
                }
                
                if (this.parentIntent.length > 0) {
                    return `💫 扶光精选：重点培养${this.parentIntent.join('、')}`;
                }
                
                const curiosity = video.values.curiosity || 0;
                if (curiosity > 0.8) {
                    return `🔍 好奇心警报！解答「为什么会这样」的问题`;
                }
                
                return `✨ 扶光推荐：${video.title}`;
            }
            
            setParentIntent(intents) {
                this.parentIntent = intents;
            }
            
            getStats() {
                const entropy = this.computeDiversityEntropy();
                const totalWatches = this.watchHistory.length;
                const naturalEnds = this.watchHistory.filter(h => h.action === 'natural_end').length;
                const endRate = totalWatches > 0 ? (naturalEnds / totalWatches * 100).toFixed(0) : 0;
                
                // Estimate complexity level based on watch history
                let maxComplexity = 1;
                this.watchHistory.forEach(h => {
                    const video = this.contentLibrary[h.videoId];
                    if (video) {
                        const level = parseInt(video.complexity.replace('L', ''));
                        maxComplexity = Math.max(maxComplexity, level);
                    }
                });
                
                return {
                    watches: totalWatches,
                    entropy: entropy.toFixed(2),
                    endRate: endRate + '%',
                    complexity: 'L' + maxComplexity
                };
            }
            
            getValueDistribution() {
                return this.valueExposure;
            }
        }
        
        // ========== Frontend Controller ==========
        
        let recommender = new ScaffoldingMLRecommender();
        let currentRecommendations = [];
        let logs = [];
        
        function initUser() {
            const name = document.getElementById('username').value || '小明';
            const ageGroup = document.getElementById('ageGroup').value;
            
            recommender.initUser(name, ageGroup);
            
            document.getElementById('statsCard').style.display = 'block';
            document.getElementById('parentCard').style.display = 'block';
            document.getElementById('recommendCard').style.display = 'block';
            document.getElementById('logCard').style.display = 'block';
            
            addLog('system', `用户 ${name} (${ageGroup}) 已初始化`);
            
            refreshUI();
            getRecommendations();
        }
        
        function getRecommendations() {
            currentRecommendations = recommender.getRecommendations(8);
            renderRecommendations();
            addLog('recommend', `生成 ${currentRecommendations.length} 条推荐`);
        }
        
        function renderRecommendations() {
            const grid = document.getElementById('videoGrid');
            grid.innerHTML = '';
            
            currentRecommendations.forEach((video, idx) => {
                const card = document.createElement('div');
                card.className = 'video-card fade-in';
                card.style.animationDelay = `${idx * 0.1}s`;
                
                const complexityLabel = video.complexity.replace('L', 'L');
                const curiosity = Math.round((video.values.curiosity || 0.5) * 100);
                
                card.innerHTML = `
                    <div class="video-thumbnail">${video.emoji}</div>
                    <div class="video-info">
                        <div class="video-title">${video.title}</div>
                        <div class="video-meta">
                            <span class="tag tag-complexity">${video.complexity}</span>
                            <span class="tag tag-value">${video.category}</span>
                        </div>
                        <div class="video-score">
                            <div class="score-bar">
                                <div class="score-fill" style="width: ${video.mlScore * 100}%"></div>
                            </div>
                            <span class="score-value">${(video.mlScore * 100).toFixed(0)}</span>
                        </div>
                        <div class="video-reason">${video.reason}</div>
                        <div class="action-buttons">
                            <button class="action-btn watch" onclick="watchVideo('${video.id}', 'watch')">✅ 观看</button>
                            <button class="action-btn end" onclick="watchVideo('${video.id}', 'natural_end')">🏁 主动结束</button>
                            <button class="action-btn skip" onclick="skipVideo('${video.id}')">⏭️ 跳过</button>
                        </div>
                    </div>
                `;
                
                grid.appendChild(card);
            });
        }
        
        function watchVideo(videoId, action) {
            recommender.recordWatch(videoId, action);
            
            const video = recommender.contentLibrary[videoId];
            const actionText = action === 'natural_end' ? '主动结束' : '观看';
            addLog('action', `${actionText}：「${video.title}」`);
            
            if (action === 'natural_end') {
                addLog('system', '🎉 扶光：你很有主见地选择看什么！');
            }
            
            refreshUI();
            getRecommendations();
        }
        
        function skipVideo(videoId) {
            const video = recommender.contentLibrary[videoId];
            addLog('action', `跳过：「${video.title}」`);
            getRecommendations();
        }
        
        function setIntent(intent) {
            const chips = document.querySelectorAll('.intent-chip');
            const index = recommender.parentIntent.indexOf(intent);
            
            if (index > -1) {
                recommender.parentIntent.splice(index, 1);
                chips.forEach(c => {
                    if (c.textContent.includes(intent)) c.classList.remove('active');
                });
            } else {
                recommender.parentIntent.push(intent);
                chips.forEach(c => {
                    if (c.textContent.includes(intent)) c.classList.add('active');
                });
            }
            
            addLog('system', `家长培育意向：${recommender.parentIntent.join('、') || '未设置'}`);
            getRecommendations();
        }
        
        function showParentReport() {
            const stats = recommender.getStats();
            const values = recommender.getValueDistribution();
            
            let report = `
📊 扶光周报
━━━━━━━━━━━━━━━━━━
👤 用户：${recommender.user.name}
📅 日期：${new Date().toLocaleDateString('zh-CN')}

🎬 观看习惯
• 总观看：${stats.watches}次
• 主动结束率：${stats.endRate}
• 认知多样性熵：${stats.entropy}

🌈 价值观分布
`;
            
            Object.entries(values).forEach(([key, value]) => {
                const bar = '█'.repeat(Math.round(value * 10)) + '░'.repeat(10 - Math.round(value * 10));
                report += `• ${key} [${bar}] ${(value * 100).toFixed(0)}%\n`;
            });
            
            report += `\n💬 扶光评语：`;
            if (stats.entropy > 2) {
                report += `兴趣越来越多元化了！`;
            } else if (stats.endRate > '50%') {
                report += `越来越懂得控制观看节奏了！`;
            } else {
                report += `本周表现不错，继续保持！`;
            }
            
            alert(report);
        }
        
        function refreshUI() {
            const stats = recommender.getStats();
            document.getElementById('statWatches').textContent = stats.watches;
            document.getElementById('statEntropy').textContent = stats.entropy;
            document.getElementById('statEndRate').textContent = stats.endRate;
            document.getElementById('statComplexity').textContent = stats.complexity;
            
            // Update value bars
            const values = recommender.getValueDistribution();
            Object.entries(values).forEach(([key, value]) => {
                const barClass = key.toLowerCase();
                const bar = document.querySelector(`.value-fill.${barClass}`);
                if (bar) {
                    bar.style.width = `${value * 100}%`;
                }
            });
        }
        
        function addLog(type, message) {
            const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            logs.unshift({ type, message, time });
            if (logs.length > 50) logs.pop();
            renderLogs();
        }
        
        function renderLogs() {
            const container = document.getElementById('logContainer');
            container.innerHTML = logs.map(log => `
                <div class="log-entry ${log.type}">
                    <span class="log-time">${log.time}</span>
                    ${log.message}
                </div>
            `).join('');
        }
        
        // Auto-init
        document.addEventListener('DOMContentLoaded', () => {
            // Show welcome message
            setTimeout(() => {
                addLog('system', '🌟 扶光系统已就绪，请设置用户信息开始体验');
            }, 500);
        });
    </script>
